    <script>
        const SERVER_URL = "";
        let selectedMethod = "crash_android";
        let deviceCode;

        function getCookie(name) {
            let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return match[2];
            return null;
        }

        const isUserLoggedIn = getCookie("loggedIn");
        if (isUserLoggedIn !== "true") {
            window.location.href = "login";
        }

        const cookieName = getCookie("userName");
        const cookiePic = getCookie("profilePic");
        
        if (cookieName) {
            document.getElementById("display-name").innerText = decodeURIComponent(cookieName);
        }
        if (cookiePic) {
            document.getElementById("profile-img").src = decodeURIComponent(cookiePic);
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-box').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            if (tabId === 'tab-groups') {
                fetchGroups();
            }
        }

        async function fetchGroups() {
            const container = document.getElementById('groupListContainer');
            container.innerHTML = '<div class="loading-text">LISTING ALL GROUPS...</div>';

            try {
                const res = await fetch(SERVER_URL + '/listgc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deviceCode: deviceCode })
                });
                
                const data = await res.json();
                
                if (data.success && data.groups) {
                    container.innerHTML = '';
                    if (data.groups.length === 0) {
                        container.innerHTML = '<div class="loading-text" style="color: #888;">NO GROUPS FOUND</div>';
                        return;
                    }

                    data.groups.forEach(group => {
                        const dp = group.profilePicture ? group.profilePicture : 'https://sabir7718.is-a.dev/photos/sayan.jpg';
                        const itemHtml = `
<div class="group-item">
    <div class="group-info">
        <img src="${dp}" class="group-dp" onerror="this.src='https://sabir7718.is-a.dev/photos/sayan.jpg'">
        <span class="group-name">${group.name}</span>
    </div>
    <button class="group-attack-btn" onclick="attackGC('${group.jid}')">ATTACK</button>
</div>
`;
                        container.innerHTML += itemHtml;
                    });
                } else {
                    container.innerHTML = '<div class="loading-text" style="color: #ff2a2a;">FAILED TO LOAD GROUPS</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="loading-text" style="color: #ff2a2a;">SERVER UNREACHABLE</div>';
            }
        }

        function toggleAttackMethods() {
            const grid = document.getElementById('gridMenu');
            grid.classList.toggle('active');
            const btn = document.querySelector('.method-trigger-btn i.fa-chevron-down');
            btn.style.transform = grid.classList.contains('active') ? "rotate(180deg)" : "rotate(0deg)";
        }
        
        async function checkSessionStatus() {
    try {

        const res = await fetch(SERVER_URL + "/session-status", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                deviceCode: deviceCode
            })
        });

        const data = await res.json();

        if(data.status === "disconnected"){

            document
            .getElementById("disconnectModal")
            .classList
            .add("active");

        }

    } catch(err){
        console.log("Session check failed");
    }
}

        function selectBug(el, method) {
            document.querySelectorAll('.grid-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            selectedMethod = method;
            showToast(method.replace('_', ' ').toUpperCase() + " SELECTED", "success");
        }

        function showToast(msg, type = "success") {
            const existing = document.querySelector('.toast');
            if(existing) existing.remove();

            const t = document.createElement("div");
            t.className = "toast";
            
            if(type === 'success' || type === true) {
                t.style.color = '#00ff88';
                t.style.borderColor = '#00ff88';
            } else {
                t.style.color = '#ff3333';
                t.style.borderColor = '#ff3333';
            }
            
            t.innerText = msg;
            document.body.appendChild(t);
            
            setTimeout(() => t.classList.add("active"), 10);
            setTimeout(() => { 
                t.classList.remove("active"); 
                setTimeout(() => t.remove(), 500); 
            }, 3000);
        }

        const expiryDate = getCookie("expiry") || localStorage.getItem("expiry");
        if (expiryDate) {
            document.getElementById("display-expiry").innerText = "EXP: " + new Date(expiryDate).toLocaleDateString();
        }
        
        const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicToggle");

musicBtn.addEventListener("click", () => {

        music.play();
        showToast("MUSIC PLAYING", "success");
    } else {

        showToast("MUSIC STOPPED", "error");

});

        async function getDeviceCodeUnified() {
            const saved = localStorage.getItem("deviceCode");
            if (saved && saved.includes("|")) return saved;

            const safe = v => (v !== undefined && v !== null && v !== "" ? v : "UNKNOWN");
            let model = "WEB", device = "WEB", brand = "WEB";

            try {
                if (typeof Native !== "undefined" && Native.getDeviceInfo) {
                    const info = Native.getDeviceInfo().split("|");
                    model = safe(info[0]); device = safe(info[1]); brand = safe(info[2]);
                }
            } catch (e) {}

            const hashSource = [
                navigator.userAgent, navigator.language, screen.width, screen.height,
                navigator.hardwareConcurrency, new Date().getTimezoneOffset()
            ].join("|");

            const encoded = new TextEncoder().encode(hashSource);
            const hashBuffer = await crypto.subtle.digest("SHA-256", encoded);
            const hash = [...new Uint8Array(hashBuffer)].map(b => b.toString(16).padStart(2, "0")).join("");

            const finalCode = `${model}|${device}|${brand}|${hash}`;
            localStorage.setItem("deviceCode", finalCode);
            return finalCode;
        }

        async function checkSystemHealth() {
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const statusBox = document.getElementById('statusBox');

            try {
                const res = await fetch(`${SERVER_URL}/bug/send`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username: getCookie("userName") || localStorage.getItem("username") || "test",
                        accessKey: getCookie("accessKey") || localStorage.getItem("accessKey") || "test",
                        deviceCode: deviceCode,
                        number: "910000000000" 
                    })
                });

                const data = await res.json();
                if (data.message) {
                    statusText.innerText = "SYSTEM ONLINE";
                    statusText.style.color = "#32d74b";
                    statusDot.style.background = "#32d74b";
                    statusBox.style.borderColor = "rgba(0, 255, 0, 0.3)";
                } else {
                    throw new Error();
                }
            } catch (error) {
                statusText.innerText = "SYSTEM ONLINE";
                    statusText.style.color = "#32d74b";
                    statusDot.style.background = "#32d74b";
                    statusBox.style.borderColor = "rgba(0, 255, 0, 0.3)";
            }
        }

        window.addEventListener("DOMContentLoaded", async () => {
            deviceCode = await getDeviceCodeUnified();
            checkSystemHealth();
            setInterval(checkSessionStatus, 10000);

        async function initiateAttack() {
            let num = document.getElementById("targetNum").value.trim();
            
            if(!num) return showToast("ENTER TARGET NUMBER", "error");
            
            num = num.replace(/[\s+]/g, "");
            if (!/^\d+$/.test(num)) return showToast("INVALID DIGITS", "error");

            showToast("INITIALIZING PAYLOAD", "success");

            let endpoint = "/sy3"; 

            if (selectedMethod === 'iphone_hard') {
                endpoint = "/sy"; 
            } else if (selectedMethod === 'delay_100') {
                endpoint = "/sy3"; 
            } else if (selectedMethod === 'force_close') {
                endpoint = "/sy2"; 
            } else {
                endpoint = "/sy2"; 
            }

            try {
                const res = await fetch(SERVER_URL + endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        deviceCode: deviceCode,
                        targetNumber: num 
                    })
                });
                const data = await res.json();
                
                if(data.success || (data.message && !data.message.includes("fail"))) {
                     showToast(data.message, "success");
                } else {
                     showToast("FAILED " + (data.message || "ERROR"), "error");
                }
                
            } catch (err) {
                showToast("SERVER UNREACHABLE", "error");
            }
        }
